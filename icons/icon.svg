<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Brain/Book icon -->
  <g transform="translate(256,240)" fill="none" stroke="#4cc9f0" stroke-width="16" stroke-linecap="round" stroke-linejoin="round">
    <!-- Open book -->
    <path d="M0,-60 C-40,-80 -100,-70 -120,-50 L-120,70 C-100,50 -40,40 0,60" fill="rgba(76,201,240,0.1)"/>
    <path d="M0,-60 C40,-80 100,-70 120,-50 L120,70 C100,50 40,40 0,60" fill="rgba(76,201,240,0.1)"/>
    <!-- Spine -->
    <line x1="0" y1="-60" x2="0" y2="60"/>
    <!-- Sparkle dots (learning) -->
    <circle cx="-60" cy="-20" r="6" fill="#4cc9f0" stroke="none"/>
    <circle cx="-40" cy="10" r="4" fill="#4cc9f0" stroke="none"/>
    <circle cx="50" cy="-10" r="5" fill="#4cc9f0" stroke="none"/>
    <circle cx="70" cy="20" r="4" fill="#4cc9f0" stroke="none"/>
  </g>
  <!-- "L" letter -->
  <text x="256" y="420" text-anchor="middle" font-family="sans-serif" font-size="48" font-weight="700" fill="#4cc9f0">LernApp</text>
</svg>
